<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="header">
    <div class="container">
      <div class="navbar">

          <img src="logo2.png" width="155px">
        </div>
        <nav>
          <ul id="MenuItems">
            <li><a href="index.html">Home</a></li>
            <li><a href="dashboard.html">Back</a></li>
          </ul>
        </nav>
        <img src="menue.png" class="menue-icon" onclick="menutoggle()">
      </div>
    </div>
  </div>

  <!-- Transfer Form -->
  <div class="signup-container">
    <h2>Transfer to another Trader</h2>
<form id="addBalanceForm">
  <input type="email" placeholder="User email" required>
  <input type="number" placeholder="Amount" required min="0.01" step="0.01">
  <button type="submit">Transfer</button>
</form>

  </div>

  <!-- JS -->
<script>
  var MenuItems = document.getElementById("MenuItems");
  var menuBtn = document.querySelector(".menue-icon");

  // Initially collapse menu
  MenuItems.style.maxHeight = "0px";

  // Toggle menu on button click
  function menutoggle() {
    if (MenuItems.style.maxHeight === "0px") {
      MenuItems.style.maxHeight = MenuItems.scrollHeight + "px"; // dynamic height
    } else {
      MenuItems.style.maxHeight = "0px";
    }
  }

  // Close menu if user clicks outside
  document.addEventListener("click", function(event) {
    if (!MenuItems.contains(event.target) && !menuBtn.contains(event.target)) {
      MenuItems.style.maxHeight = "0px";
    }
  });
</script>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getDatabase, ref, get, update, set } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";
import { getAuth, signOut, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCsdWCeIhvukSUM_8V3x7VneNtRaZf96YY",
  authDomain: "fluxitrade.firebaseapp.com",
  databaseURL: "https://fluxitrade-default-rtdb.firebaseio.com",
  projectId: "fluxitrade",
  storageBucket: "fluxitrade.firebasestorage.app",
  messagingSenderId: "594575269059",
  appId: "1:594575269059:web:c1faccf7a13689c9111676",
  measurementId: "G-NTQSJ4LBC7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// 🔹 Wait helper
function waitForAuthState(expectedState) {
  return new Promise((resolve) => {
    const unsubscribe = onAuthStateChanged(auth, (user) => {
      if ((expectedState === "loggedOut" && !user) ||
          (expectedState === "loggedIn" && user)) {
        unsubscribe();
        resolve(user);
      }
    });
  });
}

// 🔹 Form
const form = document.getElementById("addBalanceForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    const localData = JSON.parse(localStorage.getItem("savedUserInfo") || "{}");

    const email = localData.email;
    const password = localData.password;

    const targetEmail = form.querySelector('input[type="email"]').value.trim();
    const amount = parseFloat(form.querySelector('input[type="number"]').value);

    if (!email || !password) {
      alert("❌ User login data missing.");
      return;
    }

    if (!targetEmail || isNaN(amount) || amount <= 0) {
      alert("❌ Enter valid email and amount.");
      return;
    }

    // =========================
    // 🔹 STEP 1: LOGOUT
    // =========================
    await signOut(auth);
    await waitForAuthState("loggedOut");

    // =========================
    // 🔹 STEP 2: LOGIN ORIGINAL USER
    // =========================
    await signInWithEmailAndPassword(auth, email, password);
    const user = await waitForAuthState("loggedIn");

    // =========================
    // 🔹 STEP 3: FETCH USER BALANCE
    // =========================
    const currentSnap = await get(ref(db, `userInfo/${user.uid}`));
    if (!currentSnap.exists()) {
      alert("❌ Your account data not found.");
      return;
    }

    let currentBalance = parseFloat(currentSnap.val().mainBalance ?? 0);
    if (isNaN(currentBalance)) currentBalance = 0;

    if (currentBalance < amount) {
      alert("❌ Insufficient funds.");
      return;
    }

    // =========================
    // 🔹 STEP 4: SUBTRACT BALANCE
    // =========================
    const newBalance = (currentBalance - amount).toFixed(2);

    await update(ref(db, `userInfo/${user.uid}`), {
      mainBalance: newBalance
    });

    // =========================
    // 🔹 STEP 5: SAVE TRANSFER REQUEST
    // =========================
    await set(ref(db, `transferedFunds/${user.uid}`), {
      uid: user.uid,
      name: localData.name || localData.fullName || "N/A",
      senderEmail: email,
      receiverEmail: targetEmail,
      amount: amount,
      status: "Pending",
      createdAt: new Date().toISOString()
    });

    // =========================
    // 🔹 STEP 6: UPDATE LOCAL + UI
    // =========================
    localData.mainBalance = newBalance;
    localStorage.setItem("savedUserInfo", JSON.stringify(localData));

    const balanceEl = document.getElementById("mainBalance");
    if (balanceEl) {
      balanceEl.textContent = `$${newBalance}`;
    }

    // =========================
    // 🔹 SUCCESS
    // =========================
    alert(`✅ $${amount.toFixed(2)} transfer request to ${targetEmail} submitted successfully, please note that amount can take up to 24 hours to reflect on receiver account after a successful verification!`);

    form.reset();

  } catch (err) {
    console.error("TRANSFER ERROR:", err);
    alert("❌ Error processing request. Please try again.");
  }
});
</script>



</body>
</html>
