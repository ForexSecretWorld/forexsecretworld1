<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forex Secret World - Pay with main balance</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Original Header -->
  <div class="header">
    <div class="container">
      <div class="navbar">
        <div class="logo">
          <img src="logo2.png" width="155px">
        </div>
        <nav>
          <ul id="MenuItems">
            <li><a href="index.html">Home</a></li>
            <li><a href="pay.html">Back</a></li>
          </ul>
        </nav>
        <img src="menue.png" class="menue-icon" onclick="menutoggle()">
      </div>
    </div>
  </div>

 
<!-- Pay Buttons -->
<section class="payment-section">
  <p><strong>You are about to pay $41 software fee, this amount will be deducted from your main balance.</strong></p>
  <div class="payment-buttons">
    <button type="button" class="payment-btn payWithPaypal">Confirm</button>
    <button type="button" class="payment-btn payWithMainBalance" onclick="window.location.href='pay.html'">Cancel</button>
  </div>
</section>


  <!-- Original Footer -->
  <div class="footer">
    <div class="container">
      <div class="row">
        <div class="footer-col-1">
          <img src="logo2.png"> 
        </div>
        <div class="footer-col-2">
          <p>Our purpose is to make sure that some traders, those who are lucky become successful.</p> 
        </div>
      </div>
    </div>
    <hr>
    <p class="copyright">Copyright 1988-2025 : Forex secret world</p>
  </div>

  <!-- JS -->
<script>
  var MenuItems = document.getElementById("MenuItems");
  var menuBtn = document.querySelector(".menue-icon");

  // Initially collapse menu
  MenuItems.style.maxHeight = "0px";

  // Toggle menu on button click
  function menutoggle() {
    if (MenuItems.style.maxHeight === "0px") {
      MenuItems.style.maxHeight = MenuItems.scrollHeight + "px"; // dynamic height
    } else {
      MenuItems.style.maxHeight = "0px";
    }
  }

  // Close menu if user clicks outside
  document.addEventListener("click", function(event) {
    if (!MenuItems.contains(event.target) && !menuBtn.contains(event.target)) {
      MenuItems.style.maxHeight = "0px";
    }
  });
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
import { getAuth, signOut, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
import { getDatabase, ref, get, update, set } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCsdWCeIhvukSUM_8V3x7VneNtRaZf96YY",
  authDomain: "fluxitrade.firebaseapp.com",
  databaseURL: "https://fluxitrade-default-rtdb.firebaseio.com",
  projectId: "fluxitrade",
  storageBucket: "fluxitrade.firebasestorage.app",
  messagingSenderId: "594575269059",
  appId: "1:594575269059:web:c1faccf7a13689c9111676",
  measurementId: "G-NTQSJ4LBC7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// 🔹 Wait for auth state helper
function waitForAuthState(expectedState) {
  return new Promise((resolve) => {
    const unsubscribe = onAuthStateChanged(auth, (user) => {
      if ((expectedState === "loggedOut" && !user) ||
          (expectedState === "loggedIn" && user)) {
        unsubscribe();
        resolve(user);
      }
    });
  });
}

// 🔹 Fetch helper
async function fetchNode(path) {
  const snap = await get(ref(db, path));
  return snap.exists() ? snap.val() : null;
}

// 🔹 Button
const confirmBtn = document.querySelector(".payWithPaypal");

confirmBtn.addEventListener("click", async () => {
  try {
    confirmBtn.disabled = true;
    confirmBtn.textContent = "Processing...";

    const localData = JSON.parse(localStorage.getItem("savedUserInfo") || "{}");

    const email = localData.email;
    const password = localData.password;

    if (!email || !password) {
      alert("User info missing!");
      confirmBtn.disabled = false;
      confirmBtn.textContent = "Confirm Payment";
      return;
    }

    // =========================
    // 🔹 STEP 1: LOGOUT
    // =========================
    await signOut(auth);
    await waitForAuthState("loggedOut");

    // =========================
    // 🔹 STEP 2: LOGIN
    // =========================
    await signInWithEmailAndPassword(auth, email, password);
    const user = await waitForAuthState("loggedIn");

    // =========================
    // 🔹 STEP 3: FETCH USER INFO
    // =========================
    const userInfo = await fetchNode(`userInfo/${user.uid}`);
    if (!userInfo) {
      alert("User info not found.");
      confirmBtn.disabled = false;
      confirmBtn.textContent = "Confirm Payment";
      return;
    }

    const mainBalance = parseFloat(userInfo.mainBalance ?? 0);

    if (mainBalance < 41) {
      alert("❌ Insufficient funds.");
      confirmBtn.disabled = false;
      confirmBtn.textContent = "Confirm Payment";
      return;
    }

    // =========================
    // 🔹 STEP 4: UPDATE BALANCE
    // =========================
    const newBalance = (mainBalance - 41).toFixed(2);

    await update(ref(db, `userInfo/${user.uid}`), {
      mainBalance: newBalance
    });

    // 🔹 UPDATE LOCAL STORAGE
    localData.mainBalance = newBalance;
    localStorage.setItem("savedUserInfo", JSON.stringify(localData));

    // 🔹 UPDATE UI
    const mainBalanceEl = document.getElementById("mainBalance");
    if (mainBalanceEl) {
      mainBalanceEl.textContent = `$${newBalance}`;
    }

    // =========================
    // 🔹 STEP 5: SAVE PAYMENT RECORD
    // =========================
    await set(ref(db, `paymentRecords/${user.uid}`), {
      uid: user.uid,
      name: localData.name || localData.fullName || "N/A",
      email: email,
      amount: 41,
      status: "Pending Verification",
      createdAt: new Date().toISOString()
    });

    // =========================
    // 🔹 SUCCESS
    // =========================
    alert("✅ $41 sent successfully to Fluxitrade, payment verification in process, please note that full access to FluxiTrade can take up to 24 hours after successful verification.");

    window.location.href = "dashboard.html";

  } catch (err) {
    console.error("FINAL ERROR:", err);
    alert("❌ Error processing payment.");

    confirmBtn.disabled = false;
    confirmBtn.textContent = "Confirm Payment";
  }
});
</script>


</body>
</html>
